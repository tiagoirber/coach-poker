const LESSON_CACHE = new Map();

} catch {}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function callClaudeRaw(body, signal, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal,
      });
      const data = await res.json();
      // Rate limit — backoff exponencial
      if (data.error?.type === "rate_limit_error") {
        if (i < retries - 1) { await sleep(1000 * Math.pow(2, i)); continue; }
      }
      return data;
    } catch (err) {
      if (err.name === "AbortError") throw err; // não retry em abort
      if (i === retries - 1) throw err;
      await sleep(500 * (i + 1));
    }
  }
}

async function callClaudeJSON(sys, prompt, maxTokens = 1200, signal, cacheKey) {
  if (cacheKey && LESSON_CACHE.has(cacheKey)) return LESSON_CACHE.get(cacheKey);
  const data = await callClaudeRaw({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system:sys, messages:[{role:"user",content:prompt}] }, signal);
  const text = (data.content||[]).map(b=>b.text||"").join("");
  let result = null;
  try { result = JSON.parse(text.replace(/```json|```/g,"").trim()); } catch {}
  if (result && cacheKey) {
    LESSON_CACHE.set(cacheKey, result);
    try { localStorage.setItem(`cache:${cacheKey}`, JSON.stringify(result)); } catch {}
  }
  return result;
}

async function callClaudeText(sys, prompt, maxTokens = 2000, signal) {
  const data = await callClaudeRaw({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system:sys, messages:[{role:"user",content:prompt}] }, signal);
  return (data.content||[]).map(b=>b.text||"").join("");
}

// FIX: regex compilada uma única vez no module level
const GLOSSARY_KEYS = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GLOSSARY_RE = new RegExp(
  `\\b(${GLOSSARY_KEYS.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")})\\b`,
  "gi"
);

function parseAnnotations(text) {
  const parts = []; let last = 0; const used = new Set();
  const re = new RegExp(GLOSSARY_RE.source, "gi"); let m;
  while ((m = re.exec(text)) !== null) {
    const k = m[0].toLowerCase();
    if (used.has(k)) continue; used.add(k);
    if (m.index > last) parts.push({ t:"text", v:text.slice(last, m.index) });
    parts.push({ t:"term", v:m[0], k }); last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ t:"text", v:text.slice(last) });
  return parts;
}

function Tooltip({ term, children }) {
  const [vis, setVis] = useState(false);
  const [pos, setPos] = useState({ top:true, left:true });
  const ref = useRef(null);
  const timer = useRef(null);
  const def = GLOSSARY[term.toLowerCase()];
  if (!def) return <span>{children}</span>;
  const show = () => { clearTimeout(timer.current); if(ref.current){const r=ref.current.getBoundingClientRect();setPos({top:r.top>140,left:r.left<window.innerWidth/2});} setVis(true); };
  const hide = () => { timer.current = setTimeout(() => setVis(false), 150); };
  const toggle = e => { e.stopPropagation(); setVis(v=>!v); };
  useEffect(() => () => clearTimeout(timer.current), []); // FIX: cleanup no unmount
  return (
    <span ref={ref} style={{position:"relative",display:"inline"}}>
      <span onMouseEnter={show} onMouseLeave={hide} onClick={toggle}
        style={{borderBottom:"1px dashed rgba(245,158,11,.5)",color:"#fcd34d",cursor:"help"}}>
        {children}
      </span>
      {vis && (
        <span onMouseEnter={()=>clearTimeout(timer.current)} onMouseLeave={hide}
          style={{position:"absolute",zIndex:9999,[pos.top?"bottom":"top"]:"calc(100% + 8px)",[pos.left?"left":"right"]:0,width:Math.min(210,window.innerWidth-16),background:"#1c1f1c",border:"1px solid rgba(200,160,69,.3)",borderRadius:10,padding:"10px 12px",fontSize:11,lineHeight:1.6,color:T.text,boxShadow:"0 12px 40px rgba(0,0,0,.7)",display:"block"}}>
          <span style={{display:"block",color:T.gold,fontWeight:700,fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{term.toUpperCase()}</span>
          {def}
        </span>
      )}
    </span>
  );
}

// FIX: memo + useMemo para evitar re-parse desnecessário
const AnnotatedText = memo(({ text }) => {
  const parts = useMemo(() => {
    if (!text || typeof text !== "string") return [{ t:"text", v:text||"" }];
    return parseAnnotations(text);
  }, [text]);
  if (!parts.length) return <span>{text}</span>;
  return <span>{parts.map((p,i) => p.t==="term" ? <Tooltip key={i} term={p.k}>{p.v}</Tooltip> : <span key={i}>{p.v}</span>)}</span>;
});

function Toast({ message, type="error", onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  const bg = type==="error" ? "rgba(127,29,29,.95)" : "rgba(6,78,59,.95)";
  const border = type==="error" ? "rgba(248,113,113,.3)" : "rgba(52,211,153,.3)";
  return (
    <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:bg,border:`1px solid ${border}`,borderRadius:10,padding:"10px 16px",fontSize:13,color:T.text,zIndex:9999,maxWidth:320,textAlign:"center",boxShadow:"0 8px 32px rgba(0,0,0,.5)"}}>
      {message}
    </div>
  );
}

function PokerCard({card,size="md"}) {
  const d={sm:{w:36,h:50,fs:11,ss:16},md:{w:52,h:74,fs:13,ss:24},lg:{w:76,h:108,fs:15,ss:36}}[size];
  if(!card||card==="??") return <div style={{width:d.w,height:d.h,background:"rgba(6,78,59,.3)",border:"1px solid rgba(52,211,153,.2)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#34d399",fontWeight:700,fontSize:d.fs}}>?</div>;
  const rank=card.slice(0,-1),suit=card.slice(-1),red=suit==="h"||suit==="d";
  const sym={h:"♥",d:"♦",c:"♣",s:"♠"}[suit]||"",clr=red?"#c0392b":"#1a1a1a";

function ProgressArc({value,total,size=80}) {
  const pct=value/total,r=(size/2)-6,circ=2*Math.PI*r;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.gold} strokeWidth={5} strokeDasharray={`${circ*pct} ${circ*(1-pct)}`} strokeLinecap="round" style={{transition:"stroke-dasharray .6s ease"}}/>
    </svg>
  );
}

// ── QUIZ — FIX: AbortController + cache + erro tratado ───────────────────────
const DIFFS=["FÁCIL","MÉDIO","DIFÍCIL"];
const DC={"FÁCIL":{dot:"#34d399",text:"#34d399",bg:"rgba(6,78,59,.3)",border:"rgba(52,211,153,.25)"},"MÉDIO":{dot:"#fbbf24",text:"#fbbf24",bg:"rgba(120,53,15,.3)",border:"rgba(251,191,36,.25)"},"DIFÍCIL":{dot:"#f87171",text:"#f87171",bg:"rgba(127,29,29,.3)",border:"rgba(248,113,113,.25)"}};

function QuizModule({topic,onComplete}) {
  const [roundIdx,setRoundIdx]=useState(0);
  const [questions,setQuestions]=useState([null,null,null]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [submitted,setSubmitted]=useState(false);
  const [scores,setScores]=useState([]);
  const [mistakes,setMistakes]=useState([]);

  const fetchQ = useCallback((round) => {
    setLoading(true); setSel(null); setSubmitted(false);
    const controller = new AbortController();
    const diff = DIFFS[round];
    const cacheKey = `quiz:${topic.day}:${round}`;

    callClaudeJSON(
      "Coach poker. APENAS JSON (objeto único).",
      `Pergunta ${diff} Dia ${topic.day}: "${topic.title}". JSON:{"difficulty":"${diff}","question":"...","options":["...","...","...","..."],"correctIndex":0,"explanation":"..."}`,
      800, controller.signal, cacheKey
    ).then(d => {
      const q = Array.isArray(d)?d[0]:d;
      setQuestions(p=>{const n=[...p];n[round]=(q&&q.question)?q:{difficulty:diff,question:`Aplicação de ${topic.title}?`,options:["Fold equity","Valor e proteção","Sempre pot","Depende"],correctIndex:1,explanation:`${topic.title}: equilíbrio é fundamental.`};return n;});
      setLoading(false);
    }).catch(err => {
      if (err.name === "AbortError") return;
      setQuestions(p=>{const n=[...p];n[round]={difficulty:diff,question:`Aplicação de ${topic.title}?`,options:["Fold equity","Valor e proteção","Sempre pot","Depende"],correctIndex:1,explanation:`${topic.title}: equilíbrio é fundamental.`};return n;});
      setLoading(false);
    });

    return () => controller.abort();
  }, [topic]);

  useEffect(() => fetchQ(0), [topic]);

  const q = questions[roundIdx];
  const submit = () => { if(sel===null||!q)return; setSubmitted(true); const ok=sel===q.correctIndex; setScores(p=>[...p,ok?1:0]); if(!ok)setMistakes(p=>[...p,q.question]); };
  const next = () => { if(roundIdx<2){const n=roundIdx+1;setRoundIdx(n);if(!questions[n])fetchQ(n);else{setSel(null);setSubmitted(false);}}else{onComplete(scores.reduce((a,b)=>a+b,0)+(sel===(q&&q.correctIndex)?1:0),mistakes);} };

  return(
    <div style={{maxWidth:600,margin:"0 auto",paddingTop:8,display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {DIFFS.map((d,i)=>{const dc=DC[d],act=i===roundIdx,done=i<roundIdx;return(
          <div key={d} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 12px",borderRadius:999,border:`1px solid ${act?dc.border:done?"rgba(255,255,255,.08)":"rgba(255,255,255,.04)"}`,background:act?dc.bg:"transparent",color:act?dc.text:done?T.textSub:"rgba(255,255,255,.2)",fontSize:11,fontWeight:700}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:act?dc.dot:done?"rgba(255,255,255,.2)":"rgba(255,255,255,.08)"}}/>{d}{done&&" ✓"}
          </div>
        );})}
        <span style={{marginLeft:"auto",fontSize:11,color:T.textSub}}>{scores.reduce((a,b)=>a+b,0)}/{roundIdx} corretas</span>
      </div>
      {(loading||!q) ? (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,gap:16}}><Spinner size={36}/><p style={{color:T.textSub,fontSize:13}}>Gerando questão {DIFFS[roundIdx]}...</p></div>
      ) : (
        <>
          <div style={{background:T.card,borderRadius:16,border:`1px solid ${T.border}`,padding:24}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:999,border:`1px solid ${DC[q.difficulty||DIFFS[roundIdx]].border}`,background:DC[q.difficulty||DIFFS[roundIdx]].bg,color:DC[q.difficulty||DIFFS[roundIdx]].text,fontSize:10,fontWeight:700,marginBottom:18}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:DC[q.difficulty||DIFFS[roundIdx]].dot}}/>{q.difficulty||DIFFS[roundIdx]}
            </div>
            <p style={{color:T.text,fontWeight:600,fontSize:16,lineHeight:1.55,marginBottom:20}}>{q.question}</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {q.options.map((opt,i)=>{
                let bg="rgba(255,255,255,.02)",border=T.border,color=T.textMid;
                if(submitted){if(i===q.correctIndex){bg="rgba(5,150,105,.15)";border="rgba(52,211,153,.4)";color="#34d399";}else if(i===sel){bg="rgba(127,29,29,.2)";border="rgba(248,113,113,.4)";color="#f87171";}else{color="rgba(255,255,255,.2)";}}
                else if(i===sel){bg="rgba(200,160,69,.1)";border="rgba(200,160,69,.4)";color=T.text;}
                return(
                  <button key={i} onClick={()=>!submitted&&setSel(i)}
                    style={{textAlign:"left",padding:"12px 16px",borderRadius:10,border:`1px solid ${border}`,background:bg,color,fontSize:13,fontWeight:500,cursor:submitted?"default":"pointer",transition:"all .15s",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{width:22,height:22,borderRadius:6,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,color:"inherit"}}>{String.fromCharCode(65+i)}</span>
                    {opt}
                  </button>
                );
              })}
            </div>
          </div>
          {submitted&&<div style={{borderRadius:12,padding:16,border:`1px solid ${sel===q.correctIndex?"rgba(52,211,153,.2)":"rgba(248,113,113,.2)"}`,background:sel===q.correctIndex?"rgba(5,150,105,.08)":"rgba(127,29,29,.1)"}}>
            <p style={{fontWeight:700,marginBottom:6,fontSize:13,color:sel===q.correctIndex?"#34d399":"#f87171"}}>{sel===q.correctIndex?"✓ Correto!":"✗ Incorreto"}</p>
            <p style={{color:T.textMid,fontSize:13,lineHeight:1.6}}><AnnotatedText text={q.explanation}/></p>
          </div>}
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            {!submitted
              ?<button onClick={submit} disabled={sel===null} style={{padding:"11px 24px",background:sel===null?"rgba(255,255,255,.04)":T.gold,color:sel===null?T.textSub:"#0a0b0a",borderRadius:10,fontWeight:700,fontSize:13,border:"none",cursor:sel===null?"not-allowed":"pointer",transition:"all .2s"}}>Confirmar</button>
              :<button onClick={next} style={{padding:"11px 24px",background:T.gold,color:"#0a0b0a",borderRadius:10,fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>{roundIdx<2?`Próximo: ${DIFFS[roundIdx+1]} →`:"Ver Resultado →"}</button>
            }
          </div>
        </>
      )}
    </div>
  );
}

// ── SCENARIO CARD — FIX: AbortController + Promise.allSettled + estado unificado
const SIM_SYS="Você é um coach de poker GTO de altíssimo nível. Escreva em português do Brasil. Seja extremamente detalhado e didático.";
const ACTIONS=[
  {k:"FOLD",icon:"✗",label:"Fold",bg:"rgba(127,29,29,.5)",text:"#f87171",border:"rgba(248,113,113,.2)",activeBg:"#dc2626",activeText:"white"},
  {k:"CHECK",icon:"○",label:"Check",bg:"rgba(12,74,110,.5)",text:"#7dd3fc",border:"rgba(125,209,252,.2)",activeBg:"#0284c7",activeText:"white"},
  {k:"BET_SMALL",icon:"↑",label:"Bet P",bg:"rgba(6,78,59,.5)",text:"#34d399",border:"rgba(52,211,153,.2)",activeBg:"#059669",activeText:"white"},
  {k:"BET_BIG",icon:"↑↑",label:"Bet G",bg:"rgba(120,53,15,.5)",text:"#fbbf24",border:"rgba(251,191,36,.2)",activeBg:"#d97706",activeText:"#0a0b0a"},
  {k:"RAISE",icon:"⚡",label:"Raise",bg:"rgba(76,29,149,.5)",text:"#c4b5fd",border:"rgba(196,181,253,.2)",activeBg:"#7c3aed",activeText:"white"},
];

function ScenarioCard({topic,levelKey,handKey,onNext,nextLabel,combinedTopics}) {
  const [scenario,setScenario]=useState(null);
  const [loadingS,setLoadingS]=useState(true);
  const [action,setAction]=useState(null);
  const [reasoning,setReasoning]=useState("");
  const [showResult,setShowResult]=useState(false);
  const [tab,setTab]=useState("EXPLANATION");
  // FIX: estado de análise unificado
  const [analysis,setAnalysis]=useState({explanation:"",ev:"",gto:"",loading:false,error:null});

  useEffect(()=>{
    setLoadingS(true); setScenario(null); setAction(null); setReasoning(""); setShowResult(false);
    setAnalysis({explanation:"",ev:"",gto:"",loading:false,error:null});

    const controller = new AbortController();
    const isComb=Array.isArray(combinedTopics)&&combinedTopics.length>1;
    const body=isComb?`Cenário DIFÍCIL combinando:\n${combinedTopics.map(t=>`• Dia ${t.day}: ${t.title}`).join("\n")}\nSeed:${handKey}`:`Cenário ${levelKey} Dia ${topic.day}: "${topic.title}". Seed:${handKey}`;

    callClaudeJSON("Coach GTO. APENAS JSON.",
      `${body}\nJSON:{"description":"...","streets":[{"name":"Pré-Flop","board":[],"potBefore":"...","actions":[{"actor":"VILLAIN","action":"...","potAfter":"..."},{"actor":"HERO","action":"...","potAfter":"..."}]},{"name":"Flop","board":["Tc","7d","2s"],"potBefore":"...","actions":[{"actor":"VILLAIN","action":"...","potAfter":"..."},{"actor":"HERO","action":"...","potAfter":"..."}]}],"heroHand":["As","Jh"],"board":["Tc","7d","2s"],"position":"BTN","stackSize":"45 BB","villainProfile":"TIGHT","correctAction":"BET_SMALL"}`,
      1400, controller.signal
    ).then(s=>{
      const sc=Array.isArray(s)?s[0]:s;
      if(sc&&sc.heroHand){if(!Array.isArray(sc.streets))sc.streets=[];setScenario(sc);}
      else setScenario({description:`Spot de ${topic.title}.`,heroHand:["As","Jh"],board:["Kd","7c","2h","5s"],position:"BTN",stackSize:"35 BB",villainProfile:"TIGHT",correctAction:"BET_SMALL",streets:[{name:"Pré-Flop",board:[],potBefore:"1.5 BB",actions:[{actor:"VILLAIN",action:"Raise 2.5 BB",potAfter:"3.5 BB"},{actor:"HERO",action:"Call 2.5 BB",potAfter:"5.5 BB"}]},{name:"Flop",board:["Kd","7c","2h"],potBefore:"5.5 BB",actions:[{actor:"VILLAIN",action:"Check",potAfter:"5.5 BB"},{actor:"HERO",action:"Bet 3.5 BB",potAfter:"9 BB"}]},{name:"Turn",board:["Kd","7c","2h","5s"],potBefore:"12.5 BB",actions:[{actor:"VILLAIN",action:"Check",potAfter:"12.5 BB"},{actor:"HERO",action:"???",potAfter:"–"}]}]});
      setLoadingS(false);
    }).catch(err=>{
      if(err.name==="AbortError")return;
      setLoadingS(false);
    });

    return ()=>controller.abort(); // FIX: cleanup
  },[topic,levelKey,handKey]);

  const handleConfirm=useCallback(()=>{
    if(!action||!scenario)return;
    setShowResult(true);
    setAnalysis({explanation:"",ev:"",gto:"",loading:true,error:null});

    const controller = new AbortController();
    const ctx=`Mão: ${(scenario.heroHand||[]).join(" ")} | Board: ${(scenario.board||[]).join(" ")} | Pos: ${scenario.position} | Stack: ${scenario.stackSize} | Vilão: ${scenario.villainProfile} | Correta: ${scenario.correctAction} | Escolhida: ${action} | Raciocínio: "${reasoning}"`;

    // FIX: Promise.allSettled — falha individual não derruba o conjunto
    Promise.allSettled([
      callClaudeText(SIM_SYS,`${ctx}\n\nJUSTIFICATIVA — 4 parágrafos (mín 120 palavras cada):\n1. Por que "${scenario.correctAction}" é +EV.\n2. Por que FOLD desperdiça equity.\n3. Por que CHECK/CALL é passivo demais.\n4. Por que RAISE/BET_BIG comprime o SPR de forma ruim.`,2000,controller.signal),
      callClaudeText(SIM_SYS,`${ctx}\n\nANÁLISE DE EV — 3 parágrafos (mín 120 palavras cada):\n1. Cálculo EV=(fold_eq×pot)+(1-fold_eq)×(equity×pot_total-custo).\n2. Comparação entre FOLD, CHECK, BET_SMALL, BET_BIG, RAISE.\n3. Impacto do SPR com 20 BB ou 150 BB.`,2000,controller.signal),
      callClaudeText(SIM_SYS,`${ctx}\n\nANÁLISE GTO — 3 parágrafos (mín 120 palavras cada):\n1. Frequências do solver.\n2. Por que este sizing vs outros.\n3. Balanceamento: valor, blefes e semi-blefes.`,2000,controller.signal),
    ]).then(([r1,r2,r3])=>{
      setAnalysis({
        explanation: r1.status==="fulfilled" ? r1.value : "Erro ao carregar justificativa. Tente novamente.",
        ev:          r2.status==="fulfilled" ? r2.value : "Erro ao carregar análise de EV.",
        gto:         r3.status==="fulfilled" ? r3.value : "Erro ao carregar análise GTO.",
        loading: false, error: null,
      });
    });

    return ()=>controller.abort();
  },[action,scenario,reasoning]);

  if(loadingS||!scenario) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:240,gap:16}}><Spinner/><p style={{color:T.textSub,fontSize:13}}>Gerando cenário...</p></div>;

  const isCorrect=action===scenario.correctAction;
  const activeText=tab==="EXPLANATION"?analysis.explanation:tab==="EV"?analysis.ev:analysis.gto;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:16}}>
          <p style={{fontSize:10,color:T.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>📋 Cenário</p>
          <p style={{color:T.textMid,fontSize:13,lineHeight:1.6}}><AnnotatedText text={scenario.description}/></p>
        </div>
        <div style={{background:"rgba(6,78,59,.06)",border:"1px solid rgba(52,211,153,.1)",borderRadius:12,padding:16,maxHeight:220,overflowY:"auto"}}>
          <p style={{fontSize:10,color:T.greenLight,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>🃏 Histórico</p>
          {(scenario.streets||[]).map((st,si)=>(
            <div key={si} style={{marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",color:T.gold}}>{st.name}</span>
                {(st.board||[]).length>0&&<span style={{fontSize:10,color:T.textSub,fontFamily:"monospace"}}>[{st.board.join(" ")}]</span>}
                <div style={{flex:1,height:"1px",background:T.border}}/>
                <span style={{fontSize:9,color:"rgba(255,255,255,.15)",fontFamily:"monospace"}}>{st.potBefore}</span>
              </div>
              {(st.actions||[]).map((a,ai)=>{
                const hero=a.actor==="HERO",info=a.actor==="INFO";
                const fold=/fold/i.test(a.action),bet=/bet|raise|jam/i.test(a.action),call=/call/i.test(a.action);
                return(
                  <div key={ai} style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8,marginBottom:3}}>
                    {!info&&<span style={{fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:3,textTransform:"uppercase",background:hero?"rgba(200,160,69,.12)":"rgba(255,255,255,.04)",color:hero?T.gold:T.textSub,border:`1px solid ${hero?"rgba(200,160,69,.2)":"rgba(255,255,255,.06)"}`,whiteSpace:"nowrap"}}>{hero?"HERO":"VLN"}</span>}
                    <span style={{fontSize:12,fontWeight:600,color:info?T.textSub:fold?"#f87171":bet?(hero?T.gold:"#fb923c"):call?"#7dd3fc":"rgba(255,255,255,.4)",fontStyle:info?"italic":"normal"}}>{a.action}</span>
                    {a.potAfter&&a.potAfter!=="–"&&!info&&<span style={{marginLeft:"auto",fontSize:9,color:"rgba(255,255,255,.2)",fontFamily:"monospace",whiteSpace:"nowrap"}}>→ {a.potAfter}</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[["📍",scenario.position],["💰",scenario.stackSize],["🎭",scenario.villainProfile]].map(([icon,val])=>(
          <span key={val} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${T.border}`,padding:"4px 10px",borderRadius:8,fontSize:11,color:T.textSub}}>{icon} {val}</span>
        ))}
      </div>
      <div style={{position:"relative",borderRadius:20,overflow:"hidden",border:"6px solid rgba(120,53,15,.5)",minHeight:300,background:"radial-gradient(ellipse at center,#1a3d24 0%,#0d1f13 60%,#080f0b 100%)"}}>
        <div style={{position:"absolute",top:14,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",color:"rgba(255,255,255,.15)"}}>Board</span>
          <div style={{display:"flex",gap:10}}>
            {(scenario.board||[]).length>0?scenario.board.map((c,i)=><PokerCard key={i} card={c} size="lg"/>):<div style={{color:"rgba(255,255,255,.08)",fontWeight:900,fontSize:16,textTransform:"uppercase",padding:"20px 0"}}>PRE-FLOP</div>}
          </div>
        </div>
        <div style={{position:"absolute",bottom:14,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <div style={{display:"flex",gap:10}}>
            <PokerCard card={(scenario.heroHand||[])[0]} size="lg"/>
            <PokerCard card={(scenario.heroHand||[])[1]} size="lg"/>
          </div>
          <span style={{background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)",color:T.gold,fontSize:10,fontWeight:700,padding:"4px 12px",borderRadius:999,border:"1px solid rgba(200,160,69,.25)"}}>Hero · {scenario.position}</span>
        </div>
      </div>
      {!showResult?(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
            {ACTIONS.map(a=>{const s=action===a.k;return(
              <button key={a.k} onClick={()=>setAction(a.k)} style={{padding:"12px 4px",borderRadius:10,fontWeight:800,fontSize:10,textTransform:"uppercase",letterSpacing:"0.04em",border:`1px solid ${s?a.activeBg:a.border}`,borderBottom:`3px solid ${s?a.activeBg:a.border}`,background:s?a.activeBg:a.bg,color:s?a.activeText:a.text,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transform:s?"translateY(-2px)":"none",transition:"all .15s"}}>
                <span style={{fontSize:15,lineHeight:1}}>{a.icon}</span>
                <span>{a.label}</span>
              </button>
            );})}
          </div>
          {action&&(
            <div style={{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,padding:16}}>
              <label style={{fontSize:11,fontWeight:700,color:T.textSub,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:8}}>
                🧠 Por que <span style={{color:T.gold}}>{action.replace("_"," ")}</span>?
              </label>
              <textarea value={reasoning} onChange={e=>setReasoning(e.target.value)} rows={2} placeholder="Descreva sua lógica estratégica..."
                style={{width:"100%",background:"rgba(255,255,255,.02)",border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",fontSize:13,color:T.text,outline:"none",resize:"none"}}/>
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
                <button onClick={handleConfirm} disabled={reasoning.trim().length<5}
                  style={{background:reasoning.trim().length<5?"rgba(255,255,255,.04)":"#059669",color:reasoning.trim().length<5?T.textSub:"white",padding:"9px 20px",borderRadius:9,fontWeight:700,fontSize:13,border:"none",cursor:reasoning.trim().length<5?"not-allowed":"pointer",transition:"all .2s"}}>
                  Confirmar →
                </button>
              </div>
            </div>
          )}
        </div>
      ):(
        <div style={{borderRadius:14,border:`1px solid ${isCorrect?"rgba(52,211,153,.2)":"rgba(248,113,113,.15)"}`,padding:20,display:"flex",flexDirection:"column",gap:14,background:isCorrect?"rgba(5,150,105,.06)":"rgba(127,29,29,.08)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <h3 style={{fontSize:20,fontWeight:900,color:isCorrect?"#34d399":"#f87171"}}>{isCorrect?"Jogada Perfeita 🏆":"Linha -EV ❌"}</h3>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                <span style={{fontSize:10,color:T.textSub,fontWeight:700,textTransform:"uppercase"}}>GTO:</span>
                <span style={{color:T.gold,fontWeight:800,fontSize:13}}>{scenario.correctAction.replace("_"," ")}</span>
              </div>
            </div>
            <div style={{fontSize:16,fontWeight:900,padding:"8px 16px",borderRadius:8,background:"rgba(0,0,0,.3)",color:isCorrect?"#34d399":"#f87171"}}>{isCorrect?"+EV":"-EV"}</div>
          </div>
          <div style={{display:"flex",background:"rgba(255,255,255,.02)",padding:3,borderRadius:10,border:`1px solid ${T.border}`,gap:2}}>
            {[["EXPLANATION","📖 Análise"],["EV","📊 EV"],["GTO","🎯 GTO"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"7px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:tab===k?T.card:"transparent",color:tab===k?T.text:T.textSub,transition:"all .15s"}}>{l}</button>
            ))}
          </div>
          <div style={{background:"rgba(0,0,0,.15)",borderRadius:10,padding:18,minHeight:140,maxHeight:360,overflowY:"auto",fontSize:13}}>
            {analysis.loading?(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:120,gap:12}}><Spinner size={28}/><p style={{color:T.textSub,fontSize:12}}>Analisando o spot em profundidade...</p></div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {tab==="EV"&&<p style={{fontSize:10,fontWeight:700,color:T.gold,textTransform:"uppercase",letterSpacing:"0.06em"}}>Expected Value</p>}
                {tab==="GTO"&&<p style={{fontSize:10,fontWeight:700,color:T.greenLight,textTransform:"uppercase",letterSpacing:"0.06em"}}>Recomendação GTO</p>}
                {activeText.length>0
                  ?activeText.split(/\n\n+/).filter(Boolean).map((p,i)=><p key={i} style={{color:T.textMid,lineHeight:1.75}}><AnnotatedText text={p}/></p>)
                  :<p style={{color:T.textSub,fontStyle:"italic"}}>Carregando análise...</p>}
              </div>
            )}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <button onClick={onNext} style={{background:T.gold,color:"#0a0b0a",fontWeight:800,padding:"11px 24px",borderRadius:10,border:"none",cursor:"pointer",fontSize:13}}>{nextLabel}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SIMULATOR ─────────────────────────────────────────────────────────────────
const SIM_LEVELS=[{k:"EASY",label:"Fácil",dot:"#34d399",bg:"rgba(6,78,59,.3)",border:"rgba(52,211,153,.2)",text:"#34d399"},{k:"MEDIUM",label:"Médio",dot:"#fbbf24",bg:"rgba(120,53,15,.3)",border:"rgba(251,191,36,.2)",text:"#fbbf24"},{k:"HARD",label:"Difícil",dot:"#f87171",bg:"rgba(127,29,29,.3)",border:"rgba(248,113,113,.2)",text:"#f87171"}];

function SimulatorModule({topic,completedDays,onComplete}) {
  const [phase,setPhase]=useState(0);
  const [handKey,setHandKey]=useState(0);
  const [fc,setFc]=useState(0);const [gc,setGc]=useState(0);
  const completedTopics=CURRICULUM.filter(t=>completedDays.includes(t.day));
  const lvl=SIM_LEVELS[Math.min(phase,2)];
  const nextLabel=phase===0?"Subir para Médio →":phase===1?"Subir para Difícil →":phase===2?"Concluir Treino ✓":"Próximo Spot →";
  const handleNext=()=>{if(phase<2){setPhase(p=>p+1);setHandKey(k=>k+1);}else if(phase===2){setPhase(3);}else if(phase===4){setFc(c=>c+1);setHandKey(k=>k+1);}else{setGc(c=>c+1);setHandKey(k=>k+1);}};
  return(
    <div style={{maxWidth:900,margin:"0 auto",paddingBottom:60,display:"flex",flexDirection:"column",gap:16}}>
      {phase<=2&&<div style={{display:"flex",gap:8}}>{SIM_LEVELS.map((l,i)=><div key={l.k} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 12px",borderRadius:999,border:`1px solid ${phase===i?l.border:"rgba(255,255,255,.05)"}`,background:phase===i?l.bg:"transparent",color:phase===i?l.text:phase>i?T.textSub:"rgba(255,255,255,.15)",fontSize:11,fontWeight:700}}><div style={{width:6,height:6,borderRadius:"50%",background:phase===i?l.dot:phase>i?"rgba(255,255,255,.2)":"rgba(255,255,255,.06)"}}/>{l.label}{phase>i&&" ✓"}</div>)}</div>}
      {(phase===4||phase===5)&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:999,border:"1px solid",fontSize:11,fontWeight:700,background:phase===4?"rgba(127,29,29,.2)":"rgba(67,56,202,.2)",borderColor:phase===4?"rgba(248,113,113,.2)":"rgba(165,180,252,.2)",color:phase===4?"#f87171":"#a5b4fc"}}>{phase===4?`⚡ Focado · Spot #${fc}`:`🌐 Geral · Spot #${gc}`}</div>
        <button onClick={()=>setPhase(3)} style={{fontSize:11,color:T.textSub,background:"transparent",border:`1px solid ${T.border}`,padding:"4px 12px",borderRadius:8,cursor:"pointer"}}>← Modos</button>
      </div>}
      {phase===3?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,paddingTop:24,textAlign:"center"}}>
          <div style={{width:52,height:52,borderRadius:14,background:"rgba(200,160,69,.1)",border:"1px solid rgba(200,160,69,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🏆</div>
          <div><h2 style={{fontSize:22,fontWeight:900,color:T.text,marginBottom:6}}>Treino Avançado</h2><p style={{color:T.textSub,fontSize:13}}>Escolha o modo de continuação</p></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,width:"100%",maxWidth:460}}>
            <button onClick={()=>{setPhase(4);setFc(1);setHandKey(k=>k+1);}} style={{background:T.card,border:"1px solid rgba(248,113,113,.2)",borderRadius:14,padding:20,textAlign:"left",cursor:"pointer"}}>
              <div style={{fontSize:22,marginBottom:10}}>⚡</div>
              <h3 style={{color:T.text,fontWeight:800,fontSize:15,marginBottom:4}}>Focado</h3>
              <p style={{color:T.textSub,fontSize:12,lineHeight:1.5}}>Spots sobre <span style={{color:T.gold}}>{topic.title}</span>.</p>
            </button>
            <button onClick={completedDays.length>0?()=>{setPhase(5);setGc(1);setHandKey(k=>k+1);}:undefined} style={{background:T.card,border:"1px solid rgba(165,180,252,.15)",borderRadius:14,padding:20,textAlign:"left",cursor:completedDays.length>0?"pointer":"not-allowed",opacity:completedDays.length>0?1:0.4}}>
              <div style={{fontSize:22,marginBottom:10}}>🌐</div>
              <h3 style={{color:T.text,fontWeight:800,fontSize:15,marginBottom:4}}>Geral</h3>
              <p style={{color:T.textSub,fontSize:12,lineHeight:1.5}}>{completedDays.length>0?<span>IA combina <span style={{color:"#a5b4fc"}}>{completedDays.length} conceitos</span>.</span>:"Complete outras lições."}</p>
            </button>
          </div>
          <button onClick={onComplete} style={{fontSize:12,color:T.textSub,background:"transparent",border:"none",cursor:"pointer",marginTop:4}}>← Encerrar sessão</button>
        </div>
      ):(
        <ScenarioCard key={`${lvl.k}-${topic.day}-${handKey}-${phase}`} topic={topic} levelKey={phase>=4?"HARD":lvl.k} handKey={handKey} onNext={handleNext} nextLabel={nextLabel} combinedTopics={phase===5?completedTopics:null}/>
      )}
    </div>
  );
}

// ── LESSON ────────────────────────────────────────────────────────────────────
function LessonView({day,onBack,onCompleteDay,completedDays}) {
  const [stage,setStage]=useState("THEORY");
  const [score,setScore]=useState(0);
  const [missed,setMissed]=useState([]);
  const [celebrate,setCelebrate]=useState(false);
  const STAGES=["THEORY","QUIZ","SIMULATOR"];
  const stageIdx=STAGES.indexOf(stage);
  const handleComplete=(dayId,s,m)=>{onCompleteDay(dayId,s,m);setCelebrate(true);};
  if(celebrate) return <CelebrationScreen day={day} onContinue={()=>onBack()}/>;
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      <div style={{flexShrink:0,background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"10px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <button onClick={onBack} style={{background:"rgba(255,255,255,.04)",border:`1px solid ${T.border}`,color:T.textMid,cursor:"pointer",fontSize:14,padding:"5px 10px",borderRadius:8}}>←</button>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:T.textSub,fontWeight:600}}>Dia {day.day}</span>
              <CatBadge category={day.category} small/>
            </div>
            <p style={{fontWeight:700,color:T.text,fontSize:14,lineHeight:1.2,marginTop:2}}>{day.title}</p>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["THEORY","Teoria"],["QUIZ","Quiz"],["SIMULATOR","Simulação"]].map(([id,label],i)=>{
            const active=stage===id,done=stageIdx>i;
            return(
              <button key={id} onClick={()=>setStage(id)} style={{flex:1,display:"flex",flexDirection:"column",gap:4,background:"transparent",border:"none",cursor:"pointer",padding:0}}>
                <div style={{height:3,borderRadius:999,background:done?"#059669":active?T.gold:"rgba(255,255,255,.08)",transition:"all .3s"}}/>
                <span style={{fontSize:10,fontWeight:700,color:done?"#34d399":active?T.gold:T.textSub,textAlign:"center",letterSpacing:"0.04em"}}>{label}{done?" ✓":""}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 16px"}}>
        {stage==="THEORY"&&<TheoryModule topic={day} onComplete={()=>setStage("QUIZ")}/>}
        {stage==="QUIZ"&&<QuizModule topic={day} onComplete={(s,m)=>{setScore(s);setMissed(m);setStage("SIMULATOR");}}/>}
        {stage==="SIMULATOR"&&<SimulatorModule topic={day} completedDays={completedDays} onComplete={()=>handleComplete(day.day,score,missed)}/>}
      </div>
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function HomeScreen({userState,onSelectDay}) {
  const done=userState.completedDays;
  const nextDay=CURRICULUM.find(t=>!done.includes(t.day))||CURRICULUM[CURRICULUM.length-1];
  const pct=Math.round(done.length/90*100);
  const currentWeek=Math.ceil(nextDay.day/7);
  const weekTopics=getTopicsForWeek(currentWeek);
  const weekDone=weekTopics.filter(t=>done.includes(t.day)).length;
  return(
    <div style={{flex:1,overflowY:"auto"}}>
      <div style={{maxWidth:640,margin:"0 auto",padding:"20px 16px 100px"}}>
        <div style={{background:"linear-gradient(135deg,rgba(200,160,69,.12) 0%,rgba(200,160,69,.04) 100%)",border:"1px solid rgba(200,160,69,.2)",borderRadius:20,padding:24,marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-20,opacity:.06}}><ProgressArc value={done.length} total={90} size={160}/></div>
          <p style={{fontSize:10,color:T.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Seu próximo passo</p>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:16}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:12,color:T.textSub,fontWeight:600}}>Dia {nextDay.day}</span>
                <CatBadge category={nextDay.category}/>
              </div>
              <h2 style={{fontSize:22,fontWeight:900,color:T.text,lineHeight:1.2}}>{nextDay.title}</h2>
              <p style={{color:T.textSub,fontSize:13,marginTop:4,lineHeight:1.5}}>{nextDay.description}</p>
            </div>
            <div style={{flexShrink:0,position:"relative"}}>
              <ProgressArc value={done.length} total={90} size={72}/>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:16,fontWeight:900,color:T.text}}>{pct}%</span>
              </div>
            </div>
          </div>
          <button onClick={()=>onSelectDay(nextDay)} style={{width:"100%",background:T.gold,color:"#0a0b0a",fontWeight:800,fontSize:14,padding:"14px",borderRadius:12,border:"none",cursor:"pointer"}}>
            Começar Dia {nextDay.day} →
          </button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {[[done.length+"/90","Completos",T.gold],["🔥 "+userState.streak,"Sequência","#fb923c"],["Sem. "+currentWeek,`${weekDone}/${weekTopics.length} dias`,T.greenLight]].map(([val,label,color],i)=>(
            <div key={i} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"14px 12px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:900,color,lineHeight:1}}>{val}</div>
              <div style={{fontSize:10,color:T.textSub,fontWeight:600,marginTop:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>{label}</div>
            </div>
          ))}
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,overflow:"hidden"}}>
          <div style={{padding:"14px 16px",borderBottom:`1px solid ${T.border}`}}>
            <p style={{fontSize:11,color:T.textSub,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Semana {currentWeek} · {weekDone}/{weekTopics.length} concluídas</p>
            <div style={{height:3,background:"rgba(255,255,255,.05)",borderRadius:999,marginTop:8,overflow:"hidden"}}>
              <div style={{height:"100%",background:T.gold,borderRadius:999,width:`${weekDone/weekTopics.length*100}%`,transition:"width .6s"}}/>
            </div>
          </div>
          {weekTopics.map(t=>{
            const isDone=done.includes(t.day),isNext=t.day===nextDay.day;
            return(
              <div key={t.day} onClick={()=>onSelectDay(t)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:`1px solid ${T.border}`,cursor:"pointer",background:isNext?"rgba(200,160,69,.04)":"transparent"}}>
                <div style={{width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,background:isDone?"rgba(5,150,105,.2)":isNext?"rgba(200,160,69,.15)":"rgba(255,255,255,.04)",color:isDone?"#34d399":isNext?T.gold:T.textSub,border:`1px solid ${isDone?"rgba(52,211,153,.2)":isNext?"rgba(200,160,69,.2)":"rgba(255,255,255,.06)"}`,flexShrink:0}}>
                  {isDone?"✓":t.day}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:600,fontSize:13,color:isDone?T.textSub:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</p>
                  <p style={{fontSize:11,color:T.textSub,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.description}</p>
                </div>
                <CatBadge category={t.category} small/>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── CURRICULUM ────────────────────────────────────────────────────────────────
function CurriculumScreen({userState,onSelectDay,onToggleComplete}) {
  const [exp,setExp]=useState(new Set([1]));
  const toggle=w=>setExp(p=>{const n=new Set(p);n.has(w)?n.delete(w):n.add(w);return n;});
  const pct=w=>{const t=getTopicsForWeek(w);return t.length?Math.round(t.filter(x=>userState.completedDays.includes(x.day)).length/t.length*100):0;};
  return(
    <div style={{flex:1,overflowY:"auto"}}>
      <div style={{maxWidth:640,margin:"0 auto",padding:"16px 16px 100px"}}>
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:T.textSub,marginBottom:6}}>
            <span style={{fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Progresso total</span>
            <span style={{color:T.text,fontWeight:700}}>{userState.completedDays.length} / 90 dias</span>
          </div>
          <div style={{height:5,background:"rgba(255,255,255,.05)",borderRadius:999,overflow:"hidden"}}>
            <div style={{height:"100%",background:`linear-gradient(90deg,${T.gold},#f59e0b)`,borderRadius:999,width:`${userState.completedDays.length/90*100}%`,transition:"width .6s"}}/>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {ALL_WEEKS.map(week=>{
            const topics=getTopicsForWeek(week),p=pct(week),isExp=exp.has(week);
            return(
              <div key={week} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden"}}>
                <button onClick={()=>toggle(week)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",background:"transparent",border:"none",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:34,height:34,background:"rgba(255,255,255,.04)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:p===100?T.greenLight:T.textMid,border:`1px solid ${p===100?"rgba(52,211,153,.2)":T.border}`}}>{p===100?"✓":week}</div>
                    <div style={{textAlign:"left"}}>
                      <div style={{fontWeight:700,color:T.text,fontSize:13}}>Semana {week}</div>
                      <div style={{fontSize:11,color:T.textSub}}>{topics.length} aulas · {p}% completo</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:60,height:3,background:"rgba(255,255,255,.06)",borderRadius:999,overflow:"hidden"}}><div style={{height:"100%",background:p===100?"#059669":T.gold,borderRadius:999,width:`${p}%`}}/></div>
                    <span style={{color:T.textSub,fontSize:11}}>{isExp?"▲":"▼"}</span>
                  </div>
                </button>
                {isExp&&(
                  <div style={{borderTop:`1px solid ${T.border}`}}>
                    {topics.map(t=>{
                      const isDone=userState.completedDays.includes(t.day);
                      return(
                        <div key={t.day} onClick={()=>onSelectDay(t)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,.03)",cursor:"pointer",background:isDone?"rgba(5,150,105,.04)":"transparent"}}>
                          <div style={{width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,background:isDone?"rgba(5,150,105,.2)":"rgba(255,255,255,.04)",color:isDone?"#34d399":T.textSub,border:`1px solid ${isDone?"rgba(52,211,153,.2)":"rgba(255,255,255,.06)"}`,flexShrink:0}}>{isDone?"✓":t.day}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <p style={{fontWeight:600,fontSize:13,color:isDone?T.textSub:T.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</p>
                            <p style={{fontSize:11,color:T.textSub,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.description}</p>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                            <CatBadge category={t.category} small/>
                            <button onClick={e=>{e.stopPropagation();onToggleComplete(t.day);}} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:15,color:isDone?"#34d399":T.textSub,padding:"2px 4px"}}>{isDone?"☑":"☐"}</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── FLASHCARDS ────────────────────────────────────────────────────────────────
function FlashcardsScreen({cards}) {
  const [idx,setIdx]=useState(0);const [flip,setFlip]=useState(false);const [done,setDone]=useState(false);
  const all=cards.length>0?cards:[
    {id:"1",front:"O que é Pot Odds?",back:"Relação entre pote e custo de call. Pote 100, call 20 = odds 5:1."},
    {id:"2",front:"Quando usar C-Bet?",back:"Com range advantage, board favorável ou vilão fraco."},
    {id:"3",front:"O que é ICM?",back:"Converte fichas de torneio em valor monetário real."},
  ];
  const cur=all[idx];
  if(done) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:20,textAlign:"center",padding:24}}>
      <div style={{fontSize:52}}>✓</div>
      <h2 style={{fontSize:24,fontWeight:900,color:T.text}}>Sessão Completa</h2>
      <p style={{color:T.textSub}}>Você revisou {all.length} cards.</p>
      <button onClick={()=>{setDone(false);setIdx(0);setFlip(false);}} style={{background:T.gold,color:"#0a0b0a",padding:"12px 28px",borderRadius:12,border:"none",cursor:"pointer",fontWeight:700}}>Recomeçar</button>
    </div>
  );
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",padding:"20px 16px 100px",maxWidth:480,margin:"0 auto",width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <h2 style={{fontSize:16,fontWeight:800,color:T.text}}>🧠 Revisão</h2>
        <span style={{fontSize:12,color:T.textSub}}>{idx+1}/{all.length}</span>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <div onClick={()=>setFlip(!flip)} style={{minHeight:200,borderRadius:18,border:`1px solid ${flip?"rgba(52,211,153,.25)":T.border}`,background:T.card,display:"flex",alignItems:"center",justifyContent:"center",padding:28,textAlign:"center",cursor:"pointer",position:"relative",transition:"border-color .2s"}}>
          {flip&&<span style={{position:"absolute",top:14,left:50,right:50,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:T.greenLight}}>Resposta</span>}
          <p style={{fontSize:17,fontWeight:flip?500:700,color:flip?T.textMid:T.text,lineHeight:1.55}}>{flip?cur.back:cur.front}</p>
          {!flip&&<span style={{position:"absolute",bottom:14,fontSize:10,color:T.textSub}}>Toque para revelar</span>}
        </div>
      </div>
      <div style={{height:56,marginTop:16}}>
        {flip?(
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[["Errei","#7f1d1d","#f87171"],["Difícil","#78350f","#fb923c"],["Bom","#1e3a5f","#7dd3fc"],["Fácil","#14532d","#4ade80"]].map(([l,bg,c])=>(
              <button key={l} onClick={()=>{setFlip(false);if(idx<all.length-1)setIdx(i=>i+1);else setDone(true);}} style={{padding:"10px 4px",borderRadius:10,border:`1px solid ${bg}`,background:`${bg}60`,color:c,fontWeight:700,fontSize:12,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        ):(
          <div style={{display:"flex",justifyContent:"center"}}>
            <button onClick={()=>setFlip(true)} style={{background:T.gold,color:"#0a0b0a",fontWeight:800,fontSize:14,padding:"12px 32px",borderRadius:12,border:"none",cursor:"pointer"}}>Revelar</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
function BottomNav({active,onChange}) {
  const items=[{id:"HOME",icon:"⬡",label:"Início"},{id:"CURRICULUM",icon:"☰",label:"Currículo"},{id:"FLASHCARDS",icon:"◈",label:"Revisão"}];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.surface,borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 max(12px,env(safe-area-inset-bottom))",zIndex:50}}>
      {items.map(item=>{
        const act=active===item.id;
        return(
          <button key={item.id} onClick={()=>onChange(item.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"transparent",border:"none",cursor:"pointer",padding:"4px 20px",minWidth:64,minHeight:44}}>
            <span style={{fontSize:18,lineHeight:1,filter:act?"none":"opacity(0.4)",transition:"filter .2s"}}>{item.icon}</span>
            <span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:act?T.gold:T.textSub,transition:"color .2s"}}>{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({onLogin}) {
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const handleGoogle=async()=>{
    setLoading(true);setError("");
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      const result=await fbAuth.signInWithPopup(provider);
      const u=result.user;
      onLogin({id:u.uid,name:u.displayName||u.email,email:u.email,photo:u.photoURL});
    }catch(e){setError("Erro: "+e.message);setLoading(false);}
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 20%,rgba(200,160,69,.08) 0%,${T.bg} 60%)`,padding:20}}>
      <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:20,width:"100%",maxWidth:360,padding:32,textAlign:"center"}}>
        <div style={{width:64,height:64,margin:"0 auto 20px",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#0a0b0a",background:`linear-gradient(145deg,${T.gold},#8b6523)`}}>90</div>
        <h1 style={{fontSize:22,fontWeight:900,color:T.text,marginBottom:4}}>Poker Coach IA</h1>
        <p style={{color:T.textSub,fontSize:13,marginBottom:28}}>90 dias para dominar o NL Hold'em</p>
        <button onClick={handleGoogle} disabled={loading} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,background:"white",color:"#1f2937",fontWeight:700,fontSize:14,padding:"13px 20px",borderRadius:12,border:"none",cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,marginBottom:12}}>
          {loading?<div style={{width:20,height:20,border:"2px solid #9ca3af",borderTopColor:"transparent",borderRadius:"50%",animation:"_spin .9s linear infinite"}}/>:<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>}
          {loading?"Entrando...":"Continuar com Google"}
        </button>
        {error&&<p style={{color:"#f87171",fontSize:12,marginBottom:12}}>{error}</p>}
        <p style={{fontSize:11,color:"rgba(255,255,255,.15)"}}>Progresso salvo no Firebase 🔥</p>
      </div>
    </div>
  );
}

// ── MAIN APP — FIX: saveTimer cleanup + firstLoad reset ───────────────────────
const INITIAL_STATE={completedDays:[],customFlashcards:[],quizScores:{},streak:0};

function App() {
  const [user,setUser]=useState(null);
  const [mainView,setMainView]=useState("LOADING");
  const [tab,setTab]=useState("HOME");
  const [activeDay,setActiveDay]=useState(null);
  const [userState,setUserState]=useState(INITIAL_STATE);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [toast,setToast]=useState(null);
  const saveTimer=useRef(null);
  const firstLoad=useRef(true);

  useEffect(()=>{
    fbAuth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        const u={id:fbUser.uid,name:fbUser.displayName||fbUser.email,email:fbUser.email,photo:fbUser.photoURL};
        setUser(u);
        const data=await fbLoad(fbUser.uid);
        setUserState(data||INITIAL_STATE);
        firstLoad.current=true; // FIX: reset no login
        setMainView("APP");
      }else{setUser(null);setMainView("LOGIN");setUserState(INITIAL_STATE);}
    });
    // FIX: cleanup do saveTimer no unmount
    return ()=>clearTimeout(saveTimer.current);
  },[]);

  useEffect(()=>{
    if(!user||mainView!=="APP")return;
    if(firstLoad.current){firstLoad.current=false;return;}
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const ok=await fbSave(user.id,userState);
      setSyncStatus(ok?"saved":"error");
      if(!ok) setToast("Erro ao salvar progresso. Verifique sua conexão.");
      setTimeout(()=>setSyncStatus("idle"),2000);
    },800);
  },[userState,user,mainView]);

  const handleLogout=()=>fbAuth.signOut();
  const toggleComplete=dayId=>setUserState(p=>({...p,completedDays:p.completedDays.includes(dayId)?p.completedDays.filter(d=>d!==dayId):[...p.completedDays,dayId]}));
  const completeDay=(dayId,score)=>{setUserState(p=>({...p,completedDays:p.completedDays.includes(dayId)?p.completedDays:[...p.completedDays,dayId],quizScores:{...p.quizScores,[dayId]:score},streak:p.completedDays.includes(dayId)?p.streak:p.streak+1}));setActiveDay(null);};

  if(mainView==="LOADING") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg,flexDirection:"column",gap:14}}>
      <Spinner size={36}/><p style={{color:T.textSub,fontSize:13}}>Carregando...</p>
    </div>
  );
  if(mainView==="LOGIN") return <LoginScreen onLogin={u=>setUser(u)}/>;

  if(activeDay) return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:T.bg}}>
      <LessonView day={activeDay} completedDays={userState.completedDays} onBack={()=>setActiveDay(null)} onCompleteDay={completeDay}/>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:T.bg}}>
      {toast&&<Toast message={toast} onClose={()=>setToast(null)}/>}
      <div style={{height:52,flexShrink:0,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",background:T.surface}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#0a0b0a",background:`linear-gradient(145deg,${T.gold},#8b6523)`}}>90</div>
          <span style={{fontWeight:800,fontSize:14,color:T.text,letterSpacing:"-0.01em"}}>Poker Coach</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {syncStatus==="saving"&&<span style={{fontSize:10,color:T.gold,opacity:.7}}>☁️</span>}
          {syncStatus==="saved"&&<span style={{fontSize:10,color:T.greenLight,opacity:.7}}>✓ salvo</span>}
          {syncStatus==="error"&&<span style={{fontSize:10,color:"#f87171",opacity:.9}}>⚠️ erro</span>}
          {user&&user.photo?<img src={user.photo} style={{width:28,height:28,borderRadius:"50%",border:`1px solid ${T.border}`}} alt="av"/>:<div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${T.gold},#8b6523)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#0a0b0a"}}>{user&&user.name?user.name[0].toUpperCase():"?"}</div>}
          <button onClick={handleLogout} style={{background:"transparent",border:"none",color:T.textSub,cursor:"pointer",fontSize:13,padding:4,opacity:.6}}>⏻</button>
        </div>
      </div>
      <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="HOME"&&<HomeScreen userState={userState} onSelectDay={d=>setActiveDay(d)}/>}
        {tab==="CURRICULUM"&&<CurriculumScreen userState={userState} onSelectDay={d=>setActiveDay(d)} onToggleComplete={toggleComplete}/>}
        {tab==="FLASHCARDS"&&<FlashcardsScreen cards={userState.customFlashcards}/>}
      </main>
      <BottomNav active={tab} onChange={setTab}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
