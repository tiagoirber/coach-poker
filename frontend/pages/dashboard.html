<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Poker Coach IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        poker: { bg:'#0a0b0a', surface:'#111412', card:'#161a16', gold:'#c8a045' }
      }}}
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="../css/glass.css">
</head>

<style>
  .bot-nav-btn { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 16px; color:#6b7280; font-size:11px; font-weight:600; text-decoration:none; transition:color .15s; border-top:2px solid transparent; }
  .bot-nav-btn.active, .bot-nav-btn:hover { color:#c8a045; border-top-color:#c8a045; }
</style>
<body class="min-h-screen pb-20 text-white" style="background:#0a0b0a;">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 border-b border-white/5"
       style="background:#111412;">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">

      <div class="flex items-center gap-2">
        <span class="text-xl">🃏</span>
        <span class="font-bold text-white">Poker Coach IA</span>
      </div>

      <div class="flex items-center gap-3">
        <!-- Menu do usuário -->
        <div class="relative group">
          <button class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold"
                  style="background:#c8a045; color:#000;"
                  id="user-avatar">?</button>

          <!-- Dropdown -->
          <div class="absolute right-0 mt-2 w-48 rounded-lg overflow-hidden shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all"
               style="background:#161a16; border:1px solid rgba(255,255,255,0.08);">
            <p id="nav-email" class="px-4 py-2 text-xs text-gray-400 border-b border-white/5 truncate"></p>
            <a href="/frontend/pages/profile.html"
               class="block px-4 py-2 text-sm text-gray-300 hover:bg-white/5">Meu Perfil</a>
            <!-- Link admin — visível só para admins (via JS) -->
            <a href="/frontend/pages/admin.html" id="admin-link"
               class="hidden px-4 py-2 text-sm text-yellow-400 hover:bg-white/5">⚙️ Admin</a>
            <button onclick="logout()"
                    class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-white/5">
              Sair
            </button>
          </div>
        </div>
      </div>

    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Boas-vindas + progresso -->
    <section class="mb-8">
      <h2 class="text-2xl font-bold mb-1">
        Olá, <span id="welcome-name">jogador</span>! 👋
      </h2>
      <p class="text-gray-400 text-sm">
        Dia <span id="current-day" class="text-white font-semibold">1</span> de 90 —
        Continue sua jornada
      </p>

      <!-- Barra de progresso geral -->
      <div class="mt-4 rounded-lg p-4 gp" style="border:1px solid rgba(255,255,255,0.06);">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-gray-400">Progresso geral</span>
          <span id="progress-pct" class="font-semibold" style="color:#c8a045;">0%</span>
        </div>
        <div class="h-2 rounded-full overflow-hidden" style="background:rgba(255,255,255,0.08);">
          <div id="progress-bar" class="h-full rounded-full transition-all duration-700"
               style="width:0%; background:linear-gradient(90deg,#059669,#c8a045);"></div>
        </div>
      </div>
    </section>

    <!-- Cards de estatísticas -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="rounded-xl p-4 gp" style="border:1px solid rgba(255,255,255,0.06);">
        <p class="text-xs text-gray-400 mb-1">XP Total</p>
        <p id="stat-xp" class="text-2xl font-bold" style="color:#c8a045;">0</p>
      </div>
      <div class="rounded-xl p-4 gp" style="border:1px solid rgba(255,255,255,0.06);">
        <p class="text-xs text-gray-400 mb-1">Sequência</p>
        <p id="stat-streak" class="text-2xl font-bold text-orange-400">0 🔥</p>
      </div>
      <div class="rounded-xl p-4 gp" style="border:1px solid rgba(255,255,255,0.06);">
        <p class="text-xs text-gray-400 mb-1">Lições concluídas</p>
        <p id="stat-completed" class="text-2xl font-bold text-green-400">0</p>
      </div>
      <div class="rounded-xl p-4 gp" style="border:1px solid rgba(255,255,255,0.06);">
        <p class="text-xs text-gray-400 mb-1">Dias restantes</p>
        <p id="stat-remaining" class="text-2xl font-bold text-blue-400">90</p>
      </div>
    </section>

    <!-- Grid principal: currículo + sidebar -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Coluna principal: lista de lições -->
      <div class="lg:col-span-2">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold">Currículo — 90 Dias</h3>
          <!-- Filtro por semana -->
          <select id="week-filter" onchange="filterWeek(this.value)"
                  class="text-sm px-3 py-1.5 rounded-lg outline-none"
                  style="background:#161a16; border:1px solid rgba(255,255,255,0.08); color:#9ca3af;">
            <option value="all">Todas as semanas</option>
          </select>
        </div>

        <!-- Lista de lições (preenchida via JS) -->
        <div id="lessons-list" class="space-y-2">
          <!-- Skeleton loader enquanto carrega -->
          <div class="animate-pulse rounded-lg h-16" style="background:#111412;"></div>
          <div class="animate-pulse rounded-lg h-16" style="background:#111412;"></div>
          <div class="animate-pulse rounded-lg h-16" style="background:#111412;"></div>
        </div>
      </div>

      <!-- Sidebar: leaderboard -->
      <div>
        <h3 class="font-semibold mb-4">🏆 Ranking</h3>
        <div id="leaderboard" class="space-y-2">
          <div class="animate-pulse rounded-lg h-12" style="background:#111412;"></div>
          <div class="animate-pulse rounded-lg h-12" style="background:#111412;"></div>
          <div class="animate-pulse rounded-lg h-12" style="background:#111412;"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Modal de lição concluída (feedback visual) -->
  <div id="modal-complete" class="fixed inset-0 z-50 hidden items-center justify-center"
       style="background:rgba(0,0,0,0.7);">
    <div class="rounded-xl p-8 text-center max-w-sm mx-4"
         style="background:#161a16; border:1px solid rgba(200,160,69,0.3);">
      <div class="text-5xl mb-3">🎉</div>
      <h3 class="text-xl font-bold mb-2">Lição concluída!</h3>
      <p id="modal-xp" class="mb-4" style="color:#c8a045;"></p>
      <button onclick="closeModal()"
              class="px-6 py-2 rounded-lg font-semibold text-black"
              style="background:#c8a045;">Continuar</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-40" style="background:#111412; border-top:1px solid rgba(255,255,255,0.08);">
    <div class="max-w-4xl mx-auto flex justify-around">
      <a href="/frontend/pages/dashboard.html" class="bot-nav-btn active">
        <span class="text-lg">🏠</span> Home
      </a>
      <a href="/frontend/pages/dashboard.html" class="bot-nav-btn">
        <span class="text-lg">📚</span> Currículo
      </a>
      <a href="/frontend/pages/flashcards.html" class="bot-nav-btn">
        <span class="text-lg">🃏</span> Revisão
      </a>
    </div>
  </nav>

  <script type="module" src="../js/config.js"></script>
  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="../js/api.js"></script>
  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
