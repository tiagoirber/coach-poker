name: Deploy Poker Coach

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          sed -i "s|COLOQUE_SUA_CHAVE_AQUI|${{ secrets.ANTHROPIC_KEY }}|g" index.html

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: |
          git add -f index.html
          git stash
          git checkout -B gh-pages
          git stash pop
          git add -f index.html
          git commit -m "Deploy with API key injected"
          git push origin gh-pages --force
