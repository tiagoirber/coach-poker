function Tooltip({ term, children }) {
  const [vis, setVis] = React.useState(false);
  const [above, setAbove] = React.useState(true);
  const ref = React.useRef(null);
  const timer = React.useRef(null);
  const def = GLOSSARY[term.toLowerCase()];
  if (!def) return React.createElement('span', null, children);
  const show = () => { clearTimeout(timer.current); if (ref.current) { const r = ref.current.getBoundingClientRect(); setAbove(r.top > 130); } setVis(true); };
  const hide = () => { timer.current = setTimeout(() => setVis(false), 150); };
  const toggle = e => { e.stopPropagation(); setVis(v => !v); };
  return (
    <span ref={ref} style={{position:"relative",display:"inline"}}>
      <span onMouseEnter={show} onMouseLeave={hide} onClick={toggle}
        style={{borderBottom:"1.5px dashed #f59e0b",color:"#fcd34d",cursor:"help"}}>
        {children}
      </span>
      {vis && (
        <span onMouseEnter={()=>clearTimeout(timer.current)} onMouseLeave={hide}
          className="tooltip-box"
          style={{[above?"bottom":"top"]:"calc(100% + 6px)",left:0}}>
          <span style={{display:"block",color:"#f59e0b",fontWeight:900,fontSize:10,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{term.toUpperCase()}</span>
          {def}
        </span>
      )}
    </span>
  );
}

function AnnotatedText({ text }) {
  if (!text || typeof text !== "string") return <span>{text}</span>;
  const keys = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
  const re = new RegExp(`\\b(${keys.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")})\\b`,"gi");
  const parts=[]; let last=0; const used=new Set(); let m;
  const r2=new RegExp(re.source,"gi");
  while((m=r2.exec(text))!==null){
    const k=m[0].toLowerCase(); if(used.has(k))continue; used.add(k);
    if(m.index>last) parts.push({t:"text",v:text.slice(last,m.index)});
    parts.push({t:"term",v:m[0],k}); last=m.index+m[0].length;
  }
  if(last<text.length) parts.push({t:"text",v:text.slice(last)});
  if(!parts.length) return <span>{text}</span>;
  return <span>{parts.map((p,i)=>p.t==="term"?<Tooltip key={i} term={p.k}>{p.v}</Tooltip>:<span key={i}>{p.v}</span>)}</span>;
}

async function callClaudeJSON(sys,prompt,maxTokens=1200){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:sys,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  const text=(data.content||[]).map(b=>b.text||"").join("");
  try{return JSON.parse(text.replace(/```json|```/g,"").trim());}catch{return null;}
}
async function callClaudeText(sys,prompt,maxTokens=2000){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system:sys,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  return (data.content||[]).map(b=>b.text||"").join("");
}

          <h3 style={{fontWeight:700,color:"#d6d3d1",marginBottom:12,fontSize:12,textTransform:"uppercase"}}>✍️ Aprendizado Ativo</h3>
          <label style={{fontSize:11,color:"#78716c",fontWeight:700,textTransform:"uppercase"}}>Técnica Feynman</label>
          <textarea value={feynman} onChange={e=>setFeynman(e.target.value)} rows={2} placeholder="Como explicaria para um iniciante?" style={{width:"100%",marginTop:4,background:"#09090b",border:"1px solid #27272a",borderRadius:8,padding:"8px 10px",fontSize:13,color:"#e7e5e4",outline:"none",resize:"none",marginBottom:8,display:"block"}}/>
          <label style={{fontSize:11,color:"#78716c",fontWeight:700,textTransform:"uppercase"}}>Seu exemplo prático</label>
          <textarea value={example} onChange={e=>setExample(e.target.value)} rows={2} placeholder="Ex: Se eu tiver AK no BTN e..." style={{width:"100%",marginTop:4,background:"#09090b",border:"1px solid #27272a",borderRadius:8,padding:"8px 10px",fontSize:13,color:"#e7e5e4",outline:"none",resize:"none",display:"block"}}/>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <button onClick={onComplete} disabled={!ok} style={{padding:"10px 28px",borderRadius:12,fontWeight:700,fontSize:13,border:"none",cursor:ok?"pointer":"not-allowed",background:ok?"#d97706":"#27272a",color:ok?"#0c0a09":"#78716c"}}>
          {ok?"Ir para o Quiz →":"Complete o aprendizado ativo para avançar"}
        </button>
      </div>
    </div>
  );
}

// ── QUIZ ────────────────────────────────────────────────────────────────────────
const DIFFS=["FÁCIL","MÉDIO","DIFÍCIL"];
const DC={"FÁCIL":{dot:"#34d399",text:"#34d399",bg:"rgba(6,78,59,.4)",border:"#064e3b"},"MÉDIO":{dot:"#fbbf24",text:"#fbbf24",bg:"rgba(120,53,15,.4)",border:"#78350f"},"DIFÍCIL":{dot:"#f87171",text:"#f87171",bg:"rgba(127,29,29,.4)",border:"#7f1d1d"}};
function QuizModule({topic,onComplete}){
  const [roundIdx,setRoundIdx]=useState(0);
  const [questions,setQuestions]=useState([null,null,null]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [submitted,setSubmitted]=useState(false);
  const [scores,setScores]=useState([]);
  const [mistakes,setMistakes]=useState([]);
  const fetchQ=useCallback((round)=>{
    setLoading(true);setSel(null);setSubmitted(false);
    callClaudeJSON("Coach poker. APENAS JSON (objeto único).",`Pergunta ${DIFFS[round]} Dia ${topic.day}: "${topic.title}". JSON:{"difficulty":"${DIFFS[round]}","question":"...","options":["...","...","...","..."],"correctIndex":0,"explanation":"..."}`)
    .then(d=>{const q=Array.isArray(d)?d[0]:d;setQuestions(p=>{const n=[...p];n[round]=(q&&q.question)?q:{difficulty:DIFFS[round],question:`Aplicação de ${topic.title}?`,options:["Fold equity","Valor e proteção","Sempre pot","Depende"],correctIndex:1,explanation:`${topic.title}: equilíbrio é fundamental.`};return n;});setLoading(false);});
  },[topic]);
  useEffect(()=>{fetchQ(0);},[topic]);
  const q=questions[roundIdx];
  const submit=()=>{if(sel===null||!q)return;setSubmitted(true);const ok=sel===q.correctIndex;setScores(p=>[...p,ok?1:0]);if(!ok)setMistakes(p=>[...p,q.question]);};
  const next=()=>{if(roundIdx<2){const n=roundIdx+1;setRoundIdx(n);if(!questions[n])fetchQ(n);else{setSel(null);setSubmitted(false);}}else{onComplete(scores.reduce((a,b)=>a+b,0)+(sel===(q&&q.correctIndex)?1:0),mistakes);}};
  return(
    <div style={{maxWidth:600,margin:"0 auto",paddingTop:24,display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {DIFFS.map((d,i)=>{const dc=DC[d],act=i===roundIdx,done=i<roundIdx;return(
          <div key={d} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:999,border:`1px solid ${act?dc.border:done?"#3f3f46":"#27272a"}`,background:act?dc.bg:"transparent",color:act?dc.text:done?"#78716c":"#52525b",fontSize:11,fontWeight:700}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:act?dc.dot:done?"#52525b":"#3f3f46"}}/>{d}{done&&" ✓"}
          </div>
        );})}
        <span style={{marginLeft:"auto",fontSize:11,color:"#78716c",fontWeight:700}}>{scores.reduce((a,b)=>a+b,0)}/{roundIdx} corretas</span>
      </div>
      {(loading||!q)?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:192,gap:16}}><Spinner size={40}/><p style={{color:"#a8a29e",fontSize:13}}>Gerando questão {DIFFS[roundIdx]}...</p></div>:(
        <>
          <div style={{background:"#18181b",borderRadius:16,border:"1px solid #27272a",padding:24}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:999,border:`1px solid ${DC[q.difficulty||DIFFS[roundIdx]].border}`,background:DC[q.difficulty||DIFFS[roundIdx]].bg,color:DC[q.difficulty||DIFFS[roundIdx]].text,fontSize:10,fontWeight:700,marginBottom:16}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:DC[q.difficulty||DIFFS[roundIdx]].dot}}/>{q.difficulty||DIFFS[roundIdx]}
            </div>
            <p style={{color:"white",fontWeight:600,fontSize:15,lineHeight:1.6,marginBottom:20}}>{q.question}</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {q.options.map((opt,i)=>{
                let bg="rgba(39,39,42,.2)",border="#27272a",color="#d6d3d1";
                if(submitted){if(i===q.correctIndex){bg="rgba(6,78,59,.4)";border="#059669";color="#6ee7b7";}else if(i===sel){bg="rgba(127,29,29,.4)";border="#dc2626";color="#fca5a5";}else{bg="rgba(9,9,11,.2)";color="#52525b";}}
                else if(i===sel){bg="rgba(120,53,15,.3)";border="#f59e0b";color="#fcd34d";}
                return <button key={i} onClick={()=>!submitted&&setSel(i)} style={{textAlign:"left",padding:"10px 14px",borderRadius:12,border:`1px solid ${border}`,background:bg,color,fontSize:13,fontWeight:500,cursor:submitted?"default":"pointer"}}><span style={{fontWeight:700,marginRight:8,opacity:.5}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;
              })}
            </div>
          </div>
          {submitted&&<div style={{borderRadius:12,padding:16,border:`1px solid ${sel===q.correctIndex?"#059669":"#dc2626"}`,background:sel===q.correctIndex?"rgba(6,78,59,.3)":"rgba(127,29,29,.3)"}}>
            <p style={{fontWeight:700,marginBottom:6,color:sel===q.correctIndex?"#34d399":"#f87171"}}>{sel===q.correctIndex?"✓ Correto!":"✗ Incorreto"}</p>
            <p style={{color:"#d6d3d1",fontSize:13,lineHeight:1.6}}><AnnotatedText text={q.explanation}/></p>
          </div>}
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            {!submitted?<button onClick={submit} disabled={sel===null} style={{padding:"8px 20px",background:"#d97706",color:"#0c0a09",borderRadius:12,fontWeight:700,fontSize:13,border:"none",cursor:sel===null?"not-allowed":"pointer",opacity:sel===null?0.3:1}}>Confirmar</button>
            :<button onClick={next} style={{padding:"8px 20px",background:"#d97706",color:"#0c0a09",borderRadius:12,fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>{roundIdx<2?`Próximo: ${DIFFS[roundIdx+1]} →`:"Ver Resultado →"}</button>}
          </div>
        </>
      )}
    </div>
  );
}

// ── SCENARIO CARD ───────────────────────────────────────────────────────────────
const SIM_SYS="Você é um coach de poker GTO de altíssimo nível. Escreva em português do Brasil. Seja extremamente detalhado e didático.";
const ACTIONS=[
  {k:"FOLD",icon:"✗",bg:"rgba(127,29,29,.6)",text:"#f87171",border:"#7f1d1d",activeBg:"#dc2626",activeText:"white"},
  {k:"CHECK",icon:"○",bg:"rgba(12,74,110,.6)",text:"#7dd3fc",border:"#0c4a6e",activeBg:"#0284c7",activeText:"white"},
  {k:"BET_SMALL",icon:"↑",bg:"rgba(6,78,59,.6)",text:"#6ee7b7",border:"#064e3b",activeBg:"#059669",activeText:"white"},
  {k:"BET_BIG",icon:"↑↑",bg:"rgba(120,53,15,.6)",text:"#fcd34d",border:"#78350f",activeBg:"#d97706",activeText:"#0c0a09"},
  {k:"RAISE",icon:"⚡",bg:"rgba(76,29,149,.6)",text:"#c4b5fd",border:"#4c1d95",activeBg:"#7c3aed",activeText:"white"},
];

function ScenarioCard({topic,levelKey,handKey,onNext,nextLabel,combinedTopics}){
  const [scenario,setScenario]=useState(null);
  const [loadingS,setLoadingS]=useState(true);
  const [action,setAction]=useState(null);
  const [reasoning,setReasoning]=useState("");
  const [showResult,setShowResult]=useState(false);
  const [tab,setTab]=useState("EXPLANATION");
  const [expl,setExpl]=useState("");
  const [ev,setEv]=useState("");
  const [gto,setGto]=useState("");
  const [loadingA,setLoadingA]=useState(false);

  useEffect(()=>{
    setLoadingS(true);setScenario(null);setAction(null);setReasoning("");setShowResult(false);setExpl("");setEv("");setGto("");
    const isComb=Array.isArray(combinedTopics)&&combinedTopics.length>1;
    const body=isComb?`Cenário DIFÍCIL combinando:\n${combinedTopics.map(t=>`• Dia ${t.day}: ${t.title}`).join("\n")}\nSeed:${handKey}`:`Cenário ${levelKey} Dia ${topic.day}: "${topic.title}". Seed:${handKey}`;
    callClaudeJSON("Coach GTO. APENAS JSON (objeto único).",`${body}\nJSON:{"description":"...","streets":[{"name":"Pré-Flop","board":[],"potBefore":"...","actions":[{"actor":"VILLAIN","action":"...","potAfter":"..."},{"actor":"HERO","action":"...","potAfter":"..."}]},{"name":"Flop","board":["Tc","7d","2s"],"potBefore":"...","actions":[{"actor":"VILLAIN","action":"...","potAfter":"..."},{"actor":"HERO","action":"...","potAfter":"..."}]}],"heroHand":["As","Jh"],"board":["Tc","7d","2s"],"position":"BTN","stackSize":"45 BB","villainProfile":"TIGHT","correctAction":"BET_SMALL"}`,1400)
    .then(s=>{
      const sc=Array.isArray(s)?s[0]:s;
      if(sc&&sc.heroHand){if(!Array.isArray(sc.streets))sc.streets=[];setScenario(sc);}
      else setScenario({description:`Spot de ${topic.title}.`,heroHand:["As","Jh"],board:["Kd","7c","2h","5s"],position:"BTN",stackSize:"35 BB",villainProfile:"TIGHT",correctAction:"BET_SMALL",streets:[{name:"Pré-Flop",board:[],potBefore:"1.5 BB",actions:[{actor:"VILLAIN",action:"Raise 2.5 BB",potAfter:"3.5 BB"},{actor:"HERO",action:"Call 2.5 BB",potAfter:"5.5 BB"}]},{name:"Flop",board:["Kd","7c","2h"],potBefore:"5.5 BB",actions:[{actor:"VILLAIN",action:"Check",potAfter:"5.5 BB"},{actor:"HERO",action:"Bet 3.5 BB",potAfter:"9 BB"}]},{name:"Turn",board:["Kd","7c","2h","5s"],potBefore:"12.5 BB",actions:[{actor:"VILLAIN",action:"Check",potAfter:"12.5 BB"},{actor:"HERO",action:"???",potAfter:"–"}]}]});
      setLoadingS(false);
    });
  },[topic,levelKey,handKey]);

  const handleConfirm=useCallback(()=>{
    if(!action||!scenario)return;
    setShowResult(true);setLoadingA(true);
    const ctx=`Mão: ${(scenario.heroHand||[]).join(" ")} | Board: ${(scenario.board||[]).join(" ")} | Pos: ${scenario.position} | Stack: ${scenario.stackSize} | Vilão: ${scenario.villainProfile} | Correta: ${scenario.correctAction} | Escolhida: ${action} | Raciocínio: "${reasoning}"`;
    Promise.all([
      callClaudeText(SIM_SYS,`${ctx}\n\nJUSTIFICATIVA — 4 parágrafos (mín 120 palavras cada):\n1. Por que "${scenario.correctAction}" é +EV.\n2. Por que FOLD desperdiça equity.\n3. Por que CHECK/CALL é passivo demais.\n4. Por que RAISE/BET_BIG comprime o SPR de forma ruim.`,2000),
      callClaudeText(SIM_SYS,`${ctx}\n\nANÁLISE DE EV — 3 parágrafos (mín 120 palavras cada):\n1. Cálculo EV=(fold_eq×pot)+(1-fold_eq)×(equity×pot_total-custo).\n2. Comparação entre FOLD, CHECK, BET_SMALL, BET_BIG, RAISE.\n3. Impacto do SPR com 20 BB ou 150 BB.`,2000),
      callClaudeText(SIM_SYS,`${ctx}\n\nANÁLISE GTO — 3 parágrafos (mín 120 palavras cada):\n1. Frequências do solver para este spot.\n2. Por que este sizing vs outros.\n3. Balanceamento: valor, blefes e semi-blefes.`,2000),
    ]).then(([e,v,g])=>{setExpl(e);setEv(v);setGto(g);setLoadingA(false);});
  },[action,scenario,reasoning]);

  if(loadingS||!scenario) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:224,gap:16}}><Spinner/><p style={{color:"#a8a29e",fontSize:13}}>Gerando cenário...</p></div>;
  const isCorrect=action===scenario.correctAction;
  const activeText=tab==="EXPLANATION"?expl:tab==="EV"?ev:gto;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{background:"#18181b",border:"1px solid #27272a",borderRadius:12,padding:16}}>
          <p style={{fontSize:11,color:"#f59e0b",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>📋 Cenário</p>
          <p style={{color:"#e7e5e4",fontSize:13,lineHeight:1.6}}><AnnotatedText text={scenario.description}/></p>
        </div>
        <div style={{background:"#09090b",border:"1px solid rgba(6,78,59,.4)",borderRadius:12,padding:16,maxHeight:256,overflowY:"auto"}}>
          <p style={{fontSize:11,color:"#34d399",fontWeight:700,textTransform:"uppercase",marginBottom:12}}>🃏 Histórico da Mão</p>
          {(scenario.streets||[]).map((st,si)=>(
            <div key={si} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:900,textTransform:"uppercase",color:"#fbbf24"}}>{st.name}</span>
                {(st.board||[]).length>0&&<span style={{fontSize:11,color:"#52525b",fontFamily:"monospace"}}>[{st.board.join(" ")}]</span>}
                <div style={{flex:1,height:1,background:"#27272a"}}/>
                <span style={{fontSize:10,color:"#3f3f46",fontFamily:"monospace"}}>Pote: {st.potBefore}</span>
              </div>
              {(st.actions||[]).map((a,ai)=>{
                const hero=a.actor==="HERO",info=a.actor==="INFO";
                const fold=/fold/i.test(a.action),bet=/bet|raise|jam/i.test(a.action),call=/call/i.test(a.action),check=/check/i.test(a.action);
                return(
                  <div key={ai} style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8,marginBottom:4}}>
                    {!info&&<span style={{fontSize:10,fontWeight:900,padding:"1px 6px",borderRadius:4,textTransform:"uppercase",background:hero?"rgba(120,53,15,.5)":"rgba(39,39,42,.8)",color:hero?"#fcd34d":"#a8a29e",border:`1px solid ${hero?"rgba(245,158,11,.4)":"#3f3f46"}`,whiteSpace:"nowrap"}}>{hero?"HERO":"VLN"}</span>}
                    <span style={{fontSize:12,fontWeight:600,color:info?"#52525b":fold?"#f87171":bet?(hero?"#fcd34d":"#fb923c"):call?"#7dd3fc":check?"#71717a":"#d6d3d1",fontStyle:info?"italic":"normal"}}>{a.action}</span>
                    {a.potAfter&&a.potAfter!=="–"&&!info&&<span style={{marginLeft:"auto",fontSize:10,color:"#3f3f46",fontFamily:"monospace",whiteSpace:"nowrap"}}>→ {a.potAfter}</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {[["📍",scenario.position],["💰",scenario.stackSize],["🎭",scenario.villainProfile]].map(([icon,val])=>(
          <span key={val} style={{background:"#18181b",border:"1px solid #27272a",padding:"4px 10px",borderRadius:8,fontSize:12,color:"#a8a29e"}}>{icon} {val}</span>
        ))}
      </div>
      <div style={{position:"relative",borderRadius:24,overflow:"hidden",border:"8px solid rgba(120,53,15,.6)",minHeight:320,background:"radial-gradient(ellipse at center,#1c3d2a 0%,#0f2418 55%,#080f0b 100%)"}}>
        <div style={{position:"absolute",top:16,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"rgba(255,255,255,.2)"}}>Board</span>
          <div style={{display:"flex",gap:12}}>
            {(scenario.board||[]).length>0?scenario.board.map((c,i)=><PokerCard key={i} card={c} size="lg"/>):<div style={{color:"rgba(255,255,255,.1)",fontWeight:900,fontSize:20,textTransform:"uppercase",padding:"24px 0"}}>PRE-FLOP</div>}
          </div>
        </div>
        <div style={{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <div style={{display:"flex",gap:12}}>
            <PokerCard card={(scenario.heroHand||[])[0]} size="lg"/>
            <PokerCard card={(scenario.heroHand||[])[1]} size="lg"/>
          </div>
          <span style={{background:"rgba(0,0,0,.6)",color:"#fbbf24",fontSize:11,fontWeight:700,padding:"4px 14px",borderRadius:999,border:"1px solid rgba(245,158,11,.3)"}}>Hero · {scenario.position}</span>
        </div>
      </div>
      {!showResult?(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
            {ACTIONS.map(a=>{const s=action===a.k;return(
              <button key={a.k} onClick={()=>setAction(a.k)} style={{padding:"12px 4px",borderRadius:12,fontWeight:900,fontSize:11,textTransform:"uppercase",border:`1px solid ${s?a.activeBg:a.border}`,borderBottom:`4px solid ${s?a.activeBg:a.border}`,background:s?a.activeBg:a.bg,color:s?a.activeText:a.text,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transform:s?"translateY(-3px)":"translateY(0)"}}>
                <span style={{fontSize:16,lineHeight:1}}>{a.icon}</span>
                <span>{a.k.replace("_"," ")}</span>
              </button>
            );})}
          </div>
          {action&&(
            <div style={{background:"rgba(24,24,27,.9)",borderRadius:12,border:"1px solid #27272a",padding:16,display:"flex",flexDirection:"column",gap:12}}>
              <label style={{fontSize:11,fontWeight:700,color:"#78716c",textTransform:"uppercase"}}>🧠 Raciocínio para <span style={{color:"#fbbf24"}}>{action.replace("_"," ")}</span></label>
              <textarea value={reasoning} onChange={e=>setReasoning(e.target.value)} rows={2} placeholder="Descreva sua lógica estratégica..." style={{width:"100%",background:"#09090b",border:"1px solid #27272a",borderRadius:8,padding:"10px 12px",fontSize:13,color:"#e7e5e4",outline:"none",resize:"none"}}/>
              <div style={{display:"flex",justifyContent:"flex-end"}}>
                <button onClick={handleConfirm} disabled={reasoning.trim().length<5} style={{background:"#059669",color:"white",padding:"8px 20px",borderRadius:8,fontWeight:700,fontSize:13,border:"none",cursor:reasoning.trim().length<5?"not-allowed":"pointer",opacity:reasoning.trim().length<5?0.3:1}}>Confirmar →</button>
              </div>
            </div>
          )}
        </div>
      ):(
        <div style={{borderRadius:16,border:`1px solid ${isCorrect?"rgba(5,150,105,.5)":"rgba(220,38,38,.5)"}`,padding:20,display:"flex",flexDirection:"column",gap:16,background:isCorrect?"rgba(6,78,59,.2)":"rgba(127,29,29,.2)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <h3 style={{fontSize:22,fontWeight:900,color:isCorrect?"#34d399":"#f87171"}}>{isCorrect?"MÃO PERFEITA 🏆":"JOGADA -EV ❌"}</h3>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                <span style={{fontSize:11,color:"#78716c",fontWeight:700,textTransform:"uppercase"}}>GTO:</span>
                <span style={{color:"#fbbf24",fontWeight:900}}>{scenario.correctAction.replace("_"," ")}</span>
              </div>
            </div>
            <div style={{fontSize:18,fontWeight:900,padding:"8px 16px",borderRadius:8,background:"rgba(0,0,0,.4)",color:isCorrect?"#34d399":"#f87171"}}>{isCorrect?"+EV":"-EV"}</div>
          </div>
          <div style={{display:"flex",background:"rgba(9,9,11,.6)",padding:4,borderRadius:8,border:"1px solid #27272a",gap:2}}>
            {[["EXPLANATION","📖 Justificativa"],["EV","📊 Análise EV"],["GTO","🎯 GTO"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"6px 4px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:tab===k?"#27272a":"transparent",color:tab===k?"white":"#78716c"}}>{l}</button>
            ))}
          </div>
          <div style={{background:"rgba(0,0,0,.2)",borderRadius:12,padding:20,minHeight:160,maxHeight:384,overflowY:"auto",fontSize:13}}>
            {loadingA?(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:128,gap:12}}><Spinner size={32}/><p style={{color:"#a8a29e",fontSize:12}}>Analisando o spot...</p></div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                {tab==="EV"&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{width:8,height:8,borderRadius:"50%",background:"#fbbf24"}}/><span style={{color:"#fbbf24",fontWeight:900,fontSize:11,textTransform:"uppercase"}}>Expected Value</span></div>}
                {tab==="GTO"&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{width:8,height:8,borderRadius:"50%",background:"#2dd4bf"}}/><span style={{color:"#2dd4bf",fontWeight:900,fontSize:11,textTransform:"uppercase"}}>Recomendação GTO</span></div>}
                {activeText.length>0?activeText.split(/\n\n+/).filter(Boolean).map((p,i)=><p key={i} style={{color:"#e7e5e4",lineHeight:1.7}}><AnnotatedText text={p}/></p>):<p style={{color:"#52525b",fontStyle:"italic"}}>Carregando análise...</p>}
              </div>
            )}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end"}}>

// ── SIMULATOR ───────────────────────────────────────────────────────────────────
const SIM_LEVELS=[{k:"EASY",label:"Fácil",dot:"#34d399",bg:"rgba(6,78,59,.4)",border:"#064e3b",text:"#34d399"},{k:"MEDIUM",label:"Médio",dot:"#fbbf24",bg:"rgba(120,53,15,.4)",border:"#78350f",text:"#fbbf24"},{k:"HARD",label:"Difícil",dot:"#f87171",bg:"rgba(127,29,29,.4)",border:"#7f1d1d",text:"#f87171"}];
function SimulatorModule({topic,completedDays,onComplete}){
  const [phase,setPhase]=useState(0);
  const [handKey,setHandKey]=useState(0);
  const [fc,setFc]=useState(0);
  const [gc,setGc]=useState(0);
  const completedTopics=CURRICULUM.filter(t=>completedDays.includes(t.day));
  const lvl=SIM_LEVELS[Math.min(phase,2)];
  const nextLabel=phase===0?"Subir para Médio →":phase===1?"Subir para Difícil →":phase===2?"Concluir Treino ✓":phase===4?"Próximo Spot Focado →":"Próximo Spot Combinado →";
  const handleNext=()=>{if(phase<2){setPhase(p=>p+1);setHandKey(k=>k+1);}else if(phase===2){setPhase(3);}else if(phase===4){setFc(c=>c+1);setHandKey(k=>k+1);}else{setGc(c=>c+1);setHandKey(k=>k+1);}};
  return(
    <div style={{maxWidth:900,margin:"0 auto",paddingBottom:64,display:"flex",flexDirection:"column",gap:20}}>
      {phase<=2&&<div style={{display:"flex",gap:8}}>{SIM_LEVELS.map((l,i)=><div key={l.k} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:999,border:`1px solid ${phase===i?l.border:"#27272a"}`,background:phase===i?l.bg:"transparent",color:phase===i?l.text:phase>i?"#52525b":"#3f3f46",fontSize:11,fontWeight:700}}><div style={{width:8,height:8,borderRadius:"50%",background:phase===i?l.dot:phase>i?"#52525b":"#3f3f46"}}/>{l.label}{phase>i&&" ✓"}</div>)}</div>}
      {(phase===4||phase===5)&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 14px",borderRadius:999,border:"1px solid",fontSize:11,fontWeight:700,background:phase===4?"rgba(127,29,29,.3)":"rgba(67,56,202,.3)",borderColor:phase===4?"#7f1d1d":"#3730a3",color:phase===4?"#f87171":"#a5b4fc"}}>{phase===4?`⚡ Treino Focado · #${fc}`:`🌐 Treino Geral · #${gc}`}</div>
        <button onClick={()=>setPhase(3)} style={{fontSize:11,color:"#52525b",background:"transparent",border:"1px solid #27272a",padding:"4px 12px",borderRadius:8,cursor:"pointer"}}>← Modos</button>
      </div>}
      {phase===3?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:24,paddingTop:32,textAlign:"center"}}>
          <div style={{width:56,height:56,borderRadius:16,background:"rgba(120,53,15,.3)",border:"1px solid rgba(245,158,11,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>🏆</div>
          <div><h2 style={{fontSize:22,fontWeight:900,color:"white",marginBottom:8}}>Treino Avançado Desbloqueado!</h2><p style={{color:"#a8a29e",fontSize:13}}>Escolha como continuar:</p></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,width:"100%",maxWidth:480}}>
            <button onClick={()=>{setPhase(4);setFc(1);setHandKey(k=>k+1);}} style={{background:"#18181b",border:"1px solid rgba(127,29,29,.5)",borderRadius:16,padding:24,textAlign:"left",cursor:"pointer"}}>
              <div style={{fontSize:24,marginBottom:12}}>⚡</div>
              <h3 style={{color:"white",fontWeight:900,fontSize:16,marginBottom:6}}>Treino Focado</h3>
              <p style={{color:"#78716c",fontSize:12,lineHeight:1.5}}>Spots difíceis sobre <span style={{color:"#fcd34d"}}>{topic.title}</span>.</p>
            </button>
            <button onClick={completedDays.length>0?()=>{setPhase(5);setGc(1);setHandKey(k=>k+1);}:undefined} style={{background:"#18181b",border:"1px solid rgba(67,56,202,.5)",borderRadius:16,padding:24,textAlign:"left",cursor:completedDays.length>0?"pointer":"not-allowed",opacity:completedDays.length>0?1:0.4}}>
              <div style={{fontSize:24,marginBottom:12}}>🌐</div>
              <h3 style={{color:"white",fontWeight:900,fontSize:16,marginBottom:6}}>Treino Geral</h3>
              <p style={{color:"#78716c",fontSize:12,lineHeight:1.5}}>{completedDays.length>0?<span>IA combina <span style={{color:"#a5b4fc"}}>{completedDays.length} conceitos</span>.</span>:"Complete outras lições primeiro."}</p>
            </button>
          </div>
          <button onClick={onComplete} style={{fontSize:13,color:"#52525b",background:"transparent",border:"none",cursor:"pointer"}}>← Voltar ao módulo</button>
        </div>
      ):(
        <ScenarioCard key={`${lvl.k}-${topic.day}-${handKey}-${phase}`} topic={topic} levelKey={phase>=4?"HARD":lvl.k} handKey={handKey} onNext={handleNext} nextLabel={nextLabel} combinedTopics={phase===5?completedTopics:null}/>
      )}
    </div>
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────────────────
const INITIAL_STATE={completedDays:[],customFlashcards:[],quizScores:{},streak:0};

function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState("LOADING");
  const [activeDay,setActiveDay]=useState(null);
  const [userState,setUserState]=useState(INITIAL_STATE);
  const [syncStatus,setSyncStatus]=useState("idle");
  const saveTimer=useRef(null);
  const firstLoad=useRef(true);

  useEffect(()=>{
    auth.onAuthStateChanged(async fbUser=>{
      if(fbUser){
        const u={id:fbUser.uid,name:fbUser.displayName||fbUser.email,email:fbUser.email,photo:fbUser.photoURL};
        setUser(u);
        const data=await fbLoad(fbUser.uid);
        setUserState(data||INITIAL_STATE);
        setView("DASHBOARD");
      }else{setUser(null);setView("LOGIN");setUserState(INITIAL_STATE);}
    });
  },[]);

  useEffect(()=>{
    if(!user||view==="LOADING")return;
    if(firstLoad.current){firstLoad.current=false;return;}
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{const ok=await fbSave(user.id,userState);setSyncStatus(ok?"saved":"error");setTimeout(()=>setSyncStatus("idle"),2000);},800);
  },[userState,user,view]);

  const handleLogout=()=>auth.signOut();
  const toggleComplete=dayId=>setUserState(p=>({...p,completedDays:p.completedDays.includes(dayId)?p.completedDays.filter(d=>d!==dayId):[...p.completedDays,dayId]}));
  const completeDay=(dayId,score)=>{setUserState(p=>({...p,completedDays:p.completedDays.includes(dayId)?p.completedDays:[...p.completedDays,dayId],quizScores:{...p.quizScores,[dayId]:score},streak:p.completedDays.includes(dayId)?p.streak:p.streak+1}));setView("DASHBOARD");setActiveDay(null);};

  if(view==="LOADING") return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0d0f0e",flexDirection:"column",gap:16}}><Spinner/><p style={{color:"#78716c",fontSize:13}}>Carregando...</p></div>;
  if(view==="LOGIN") return <LoginScreen onLogin={u=>{setUser(u);}}/>;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"#0d0f0e",fontFamily:"system-ui,sans-serif"}}>
      <nav style={{height:56,flexShrink:0,borderBottom:"1px solid rgba(39,39,42,.8)",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",background:"#111412"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#0c0a09",background:"linear-gradient(145deg,#c8a045,#8b6523,#5c3f14)"}}>90</div>
          <span style={{fontWeight:900,fontSize:15}}>Poker Coach IA</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {view==="LESSON"&&<button onClick={()=>{setView("DASHBOARD");setActiveDay(null);}} style={{fontSize:11,color:"#a8a29e",background:"transparent",border:"1px solid #27272a",padding:"4px 12px",borderRadius:8,cursor:"pointer"}}>← Dashboard</button>}
          {view==="FLASHCARDS"&&<button onClick={()=>setView("DASHBOARD")} style={{fontSize:11,color:"#a8a29e",background:"transparent",border:"1px solid #27272a",padding:"4px 12px",borderRadius:8,cursor:"pointer"}}>← Dashboard</button>}
          {syncStatus==="saving"&&<span style={{fontSize:11,color:"#f59e0b",display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:"#d97706",display:"inline-block"}}/>🔥 Salvando...</span>}
          {syncStatus==="saved"&&<span style={{fontSize:11,color:"#34d399",display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:"#34d399",display:"inline-block"}}/>🔥 Salvo</span>}
          {user&&user.photo?<img src={user.photo} style={{width:28,height:28,borderRadius:"50%",border:"1px solid #3f3f46"}} alt="av"/>:<div style={{width:28,height:28,borderRadius:"50%",background:"#d97706",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#0c0a09"}}>{user&&user.name?user.name[0].toUpperCase():"?"}</div>}
          <button onClick={handleLogout} style={{background:"transparent",border:"none",color:"#52525b",cursor:"pointer",fontSize:14,padding:4}}>⏻</button>
        </div>
      </nav>
      {view==="DASHBOARD"&&<div style={{display:"flex",gap:4,padding:"6px 12px",borderBottom:"1px solid rgba(39,39,42,.5)",background:"#111412",flexShrink:0}}>
        {[["DASHBOARD","📚 Currículo"],["FLASHCARDS","🧠 Revisão"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} style={{padding:"5px 14px",borderRadius:8,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",background:view===v?"#27272a":"transparent",color:view===v?"white":"#78716c"}}>{l}</button>)}
      </div>}
      <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {view==="DASHBOARD"&&<Dashboard userState={userState} user={user} onSelectDay={d=>{setActiveDay(d);setView("LESSON");}} onToggleComplete={toggleComplete} onOpenFlashcards={()=>setView("FLASHCARDS")}/>}
        {view==="LESSON"&&activeDay&&<LessonView day={activeDay} completedDays={userState.completedDays} onBack={()=>{setView("DASHBOARD");setActiveDay(null);}} onCompleteDay={completeDay}/>}
        {view==="FLASHCARDS"&&<FlashcardsView cards={userState.customFlashcards} onClose={()=>setView("DASHBOARD")}/>}
      </main>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
